<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact KRADS | Join the Digital Kurukshetra</title>
    <link rel="stylesheet" href="contact.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><a href="index.html">KRADS</a></div>
            <ul class="menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </div>
    </nav>

    <header class="contact-hero">
        <div class="overlay"></div>
        <div class="hero-content">
            <h1>Contact KRADS</h1>
            <p>Deploy your strategy. Let's build your digital legacy together.</p>
        </div>
    </header>

    <section class="contact-main">
        <div class="container">
            <div class="contact-grid">
                
                <div class="contact-form-container">
                    <h2>Send a Message</h2>
                    <form class="contact-form">
                        <div class="input-group">
                            <input type="text" placeholder="Your Name" required>
                        </div>
                        <div class="input-group">
                            <input type="email" placeholder="Email Address" required>
                        </div>
                        <div class="input-group">
                            <input type="tel" placeholder="Phone Number">
                        </div>
                        <div class="input-group">
                            <textarea placeholder="Your Message" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">Send Briefing</button>
                    </form>
                </div>

                <div class="contact-info">
                    <h2>Get In Touch</h2>
                    <div class="info-item">
                        <i class="fas fa-phone-alt"></i>
                        <div>
                            <h3>Phone</h3>
                            <p>+91 9X XXXXXXXX</p>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-envelope"></i>
                        <div>
                            <h3>Email</h3>
                            <p>warroom@krads.com</p>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <div>
                            <h3>Office Location</h3>
                            <p>Sonali ACME, Tidke Colony, Nashik, India</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <section class="map-section">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d224345.8392319277!2d77.0688975472!3d28.5272131!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390cfd5b34766247%3A0x53d05e8301af7647!2sDelhi!5e0!3m2!1sen!2sin!4v1700000000000" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe> 
            <!-- <iframe src="https://share.google/joLZ0D81tDraBRmER" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>  -->

    </section>

</body>
</html>
